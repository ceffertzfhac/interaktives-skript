<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Massenpunkt auf einer Kreisbahn">
  <!-- Generisches Motiv zum Thema des Skripts: ein Massenpunkt auf einer
       Kreisbahn (gestrichelt = durchlaufener Teil der Bahn). Bewusst OHNE
       Hochschul-Marke. Der Farbton entspricht dem Akzent der Seite (#00b2a9).
       Zwei Farbsaetze ueber prefers-color-scheme, damit das Symbol in hellen
       wie dunklen Browser-Tableisten steht.
       ACHTUNG: keine doppelten Bindestriche in XML-Kommentaren (also nicht die
       CSS-Variable ausschreiben) - das macht die Datei unparsebar. -->
  <style>
    .bahn  { fill: none; stroke: #9aa3ad; stroke-width: 2.5; }
    .punkt { fill: #00b2a9; stroke: #0c5f5c; stroke-width: 1.5; }
    @media (prefers-color-scheme: dark) {
      .bahn  { stroke: #c8ced6; }
      .punkt { fill: #2fd4cb; stroke: #0c5f5c; }
    }
  </style>
  <circle class="bahn" cx="16" cy="16" r="11" stroke-dasharray="3.5 3.2" stroke-linecap="round"/>
  <circle class="punkt" cx="23.8" cy="8.2" r="5"/>
</svg>
